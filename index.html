<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>은행 mock data · 재료 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root {
  --bg:#0c0e11; --panel:#14171c; --panel2:#1a1e24; --border:#272c34; --text:#dadee4; --muted:#8b929d;
  --dim:#5b626c; --accent:#e8b341; --sig:#6aa9e0; --lin:#b291e6;
  --high:#4ec98a; --med:#e8b341; --low:#e06b5e;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace; --sans:'IBM Plex Sans KR',system-ui,sans-serif;
}
* { box-sizing:border-box }
body { margin:0; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:15px }
button { font-family:var(--mono) }
a { color:var(--sig) }
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px}
table { border-collapse:collapse }
</style>
</head>
<body>
<div id="root"></div>
<script src="lib.js"></script>
